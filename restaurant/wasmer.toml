# Wasmer manifest for DzieRes (PHP front controller)
# This lives inside the deploy package root (restaurant/) because
# restaurant/app.yaml sets `package: .`. `wasmer deploy` reads the manifest
# from the package root, so it must be here — not at the repo root.

[package]
name = "dzieres"
version = "0.1.0"

# The deployed package root is this directory, so the document root and the
# router are referenced relative to it: ./server.php (NOT ./restaurant/...).
# PHP built-in server + a front-controller router (index.php). Wasmer provides
# $PORT; fall back to 8000 if absent.
[webserver]
command = "sh"
args = ["-c", "PORT=${PORT:-8000}; php -d variables_order=EGPCS -S 0.0.0.0:$PORT -t . server.php"]

# Single process; scale handled by platform.
