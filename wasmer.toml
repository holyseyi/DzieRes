[package]
name = "dzieres"
version = "0.1.0"

[package.metadata]
php_extensions = [
    "pdo",
    "pdo_sqlite",
    "sqlite3",
    "session",
    "mbstring",
    "iconv",
    "json",
    "gd",
    "curl",
    "openssl",
    "fileinfo",
]

[webserver]
command = "sh"
args = ["-c", "PORT=${PORT:-8000}; php -d variables_order=EGPCS -S 0.0.0.0:$PORT -t . server.php"]
